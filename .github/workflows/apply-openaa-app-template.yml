name: Apply OpenAA App Template

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-openaa-app-template.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize static HTML pages
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          repo = Path('.')
          html_files = sorted(p for p in repo.rglob('*.html') if '.git' not in p.parts)

          bottom_nav = '''<nav class="bottom-nav" role="navigation" aria-label="底部导航">
    <a href="https://openaa.com/" class="bottom-nav-item active" target="_self">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg><span>首页</span>
    </a>
    <a href="https://openaa.com/jobs" class="bottom-nav-item" target="_self">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><span>招聘</span>
    </a>
    <a href="https://openaa.com/secondhand" class="bottom-nav-item" target="_self">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12l3 5v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7l3-5Z"/><path d="M3 7h18"/><path d="M16 11a4 4 0 0 1-8 0"/></svg><span>二手</span>
    </a>
    <a href="https://openaa.com/news" class="bottom-nav-item" target="_self">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Z"/><path d="M4 22a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8z"/></svg><span>新闻</span>
    </a>
    <a href="https://openaa.com/profile" class="bottom-nav-item" target="_self">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span>
    </a>
  </nav>'''

          override_css = '''

    /* OpenAA app homepage shell override: synced from openaa-app static template */
    .app-shell,
    .app-header,
    .top-links-panel,
    .bottom-nav {
      max-width: 560px;
    }
    .bottom-nav-item {
      gap: 3px;
      padding: 8px 4px 10px;
      font-size: 13px;
      font-weight: 500;
    }
    .bottom-nav-item svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
    }
    .bottom-nav-item.active {
      color: #3b82f6;
      font-weight: 700;
    }
    @media (min-width: 768px) {
      .app-shell,
      .app-header,
      .top-links-panel,
      .bottom-nav {
        max-width: 760px;
      }
      .header-inner { height: 46px; }
      .header-spacer { height: 46px; }
      .top-links-panel { top: 46px; }
    }
    @media (min-width: 1024px) {
      .app-shell,
      .app-header,
      .top-links-panel,
      .bottom-nav {
        max-width: 960px;
      }
    }
    @media (min-width: 1280px) {
      .app-shell,
      .app-header,
      .top-links-panel,
      .bottom-nav {
        max-width: 1040px;
      }
    }
    @media (min-width: 601px) {
      .back-top { right: calc(50% - min(50vw, 520px) + 16px); }
    }
'''

          def normalize_html(text: str) -> str:
            text = text.replace('https://ny.openaa.com/', 'https://openaa.com/')
            text = text.replace('https://www.openaa.com/', 'https://openaa.com/')
            text = text.replace('http://ny.openaa.com/', 'https://openaa.com/')
            text = text.replace('http://www.openaa.com/', 'https://openaa.com/')

            text = text.replace('const APP_BASE_URL = \'https://ny.openaa.com\';', "const APP_BASE_URL = 'https://openaa.com';")
            text = text.replace("url: 'https://app.openaa.com/'", "url: 'https://openaa.com/'")

            # Replace fixed bottom nav with the openaa-app homepage order and style.
            text = re.sub(
              r'<nav class="bottom-nav" role="navigation" aria-label="底部导航">[\s\S]*?</nav>',
              bottom_nav,
              text,
              count=1,
            )

            # Add width/style override once, at the end of the page CSS.
            if 'OpenAA app homepage shell override' not in text:
              text = text.replace('</style>', override_css + '\n  </style>', 1)

            # Make sure old template CSS does not keep the shell stuck at 560 on desktop.
            text = re.sub(r'@media \(min-width: 768px\) \{\s*\.header-inner \{ height: 46px; \}\s*\.header-spacer \{ height: 46px; \}\s*\.top-links-panel \{ top: 46px; \}\s*\.banner-slide img \{ height: 200px; \}\s*\}',
                          '@media (min-width: 768px) {\n      .header-inner { height: 46px; }\n      .header-spacer { height: 46px; }\n      .top-links-panel { top: 46px; }\n      .banner-slide img { height: 200px; }\n    }', text)
            return text

          changed = []
          for path in html_files:
            original = path.read_text(encoding='utf-8')
            updated = normalize_html(original)
            if updated != original:
              path.write_text(updated, encoding='utf-8')
              changed.append(str(path))

          print('HTML files found:', len(html_files))
          print('Changed files:')
          for item in changed:
            print('-', item)

          leftovers = []
          for path in html_files:
            text = path.read_text(encoding='utf-8')
            if 'ny.openaa.com' in text or 'www.openaa.com' in text:
              leftovers.append(str(path))
          if leftovers:
            raise SystemExit('Domain leftovers found: ' + ', '.join(leftovers))
          PY

          rm -f .github/workflows/apply-openaa-app-template.yml

      - name: Validate HTML basics
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          bad = []
          for path in Path('.').rglob('*.html'):
            text = path.read_text(encoding='utf-8')
            for needle in ['<!DOCTYPE html>', '<html', '</html>', '<head>', '</head>', '<body', '</body>']:
              if needle not in text:
                bad.append((str(path), needle))
          if bad:
            for path, needle in bad:
              print(f'Missing {needle}: {path}')
            raise SystemExit(1)
          print('HTML basic structure check passed')
          PY

      - name: Commit migrated pages
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Normalize HTML pages to OpenAA app template"
          git push
