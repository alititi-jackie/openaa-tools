<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1677ff" />
  <title>美元人民币记录</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button id="backBtn" class="back hidden" type="button">‹ 返回</button>
      <div>
        <h1 id="pageTitle">汇率记录</h1>
        <p id="pageDesc">本机保存 · 可导出 WPS</p>
      </div>
    </header>

    <main>
      <section id="home" class="page active">
        <div class="hero">
          <div class="hero-title">美元换人民币</div>
          <div class="hero-sub">输入日期、美金、汇率，自动计算人民币</div>
        </div>
        <div class="grid-buttons">
          <button class="big-btn primary" data-go="input">＋ 输入记录</button>
          <button class="big-btn" data-go="all">📋 查看全部</button>
          <button class="big-btn" data-go="month">📅 按月查看</button>
          <button class="big-btn" data-go="year">📊 年度汇总</button>
          <button class="big-btn" data-go="backup">⬇ 导出/备份</button>
        </div>
        <div id="homeSummary" class="summary-card"></div>
      </section>

      <section id="input" class="page">
        <form id="entryForm" class="card form-card">
          <label>日期
            <input id="dateInput" type="date" required />
          </label>
          <label>美金金额 USD
            <input id="usdInput" type="number" inputmode="decimal" step="0.01" min="0" placeholder="例如 100" required />
          </label>
          <label>汇率
            <input id="rateInput" type="number" inputmode="decimal" step="0.0001" min="0" placeholder="例如 7.2500" required />
          </label>
          <div class="result-box">
            <span>人民币金额</span>
            <strong id="cnyPreview">¥0.00</strong>
          </div>
          <label>备注（可不填）
            <input id="noteInput" type="text" maxlength="50" placeholder="例如 工资、换汇、备用" />
          </label>
          <div class="actions two">
            <button type="button" class="secondary" data-go="home">取消</button>
            <button type="submit" class="primary">保存</button>
          </div>
        </form>
      </section>

      <section id="saved" class="page">
        <div class="card success-card">
          <div class="success-icon">✓</div>
          <h2>保存成功</h2>
          <p>记录已保存到当前手机浏览器本地。</p>
          <div class="actions two">
            <button type="button" class="secondary" data-go="home">返回首页</button>
            <button type="button" class="primary" data-go="input">继续添加</button>
          </div>
        </div>
      </section>

      <section id="all" class="page">
        <div id="allSummary" class="summary-card"></div>
        <div id="allList" class="list"></div>
      </section>

      <section id="month" class="page">
        <div class="card compact">
          <label>选择月份
            <input id="monthInput" type="month" />
          </label>
        </div>
        <div id="monthSummary" class="summary-card"></div>
        <div id="monthList" class="list"></div>
      </section>

      <section id="year" class="page">
        <div class="card compact">
          <label>选择年份
            <select id="yearSelect"></select>
          </label>
        </div>
        <div id="yearSummary" class="summary-card"></div>
        <div id="yearList" class="list"></div>
      </section>

      <section id="backup" class="page">
        <div class="card form-card">
          <button id="exportXlsx" class="primary full" type="button">导出 Excel（WPS 可打开）</button>
          <button id="exportJson" class="secondary full" type="button">导出备份 JSON</button>
          <label class="file-label">导入备份 JSON
            <input id="importJson" type="file" accept="application/json,.json" />
          </label>
          <button id="clearData" class="danger full" type="button">清空全部数据</button>
          <p class="tip">数据保存在本机浏览器。换手机、清缓存、换浏览器前，请先导出 JSON 备份。</p>
        </div>
      </section>
    </main>
  </div>
  <template id="emptyTpl"><div class="empty">暂无数据</div></template>
  <script src="app.js"></script>
</body>
</html>
